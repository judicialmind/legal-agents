name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install lockfile only
        run: npm i --package-lock-only --ignore-scripts

      - name: Run npm audit
        run: npm run audit

      - name: Secret pattern scan
        run: npm run security:scan-secrets

      - name: Verify publish tarball contents
        run: npm run security:pack-check
